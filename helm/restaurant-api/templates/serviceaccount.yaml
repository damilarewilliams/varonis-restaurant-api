{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "restaurant-api.serviceAccountName" . }}
  labels:
    {{- include "restaurant-api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  # IRSA: the eks.amazonaws.com/role-arn annotation binds this SA to its
  # IAM role - the pod's ONLY path to AWS permissions (no node role leak).
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
