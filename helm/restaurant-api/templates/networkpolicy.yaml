{{- if .Values.networkPolicy.enabled }}
# Default-deny with explicit allows. Requires NetworkPolicy enforcement
# in the CNI — enabled on the vpc-cni addon in the eks module.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "restaurant-api.fullname" . }}
  labels:
    {{- include "restaurant-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "restaurant-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only in-VPC sources (the ALB's ENIs and in-cluster verifiers) may
    # reach the API port. Nothing else, no other ports.
    - from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.vpcCidr }}
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # DNS resolution (CoreDNS in kube-system, plus VPC resolver).
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS only: DynamoDB (via the gateway endpoint) and STS for IRSA.
    # The API makes no other outbound calls — anything else is denied,
    # which is the exfiltration guard.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
{{- end }}
