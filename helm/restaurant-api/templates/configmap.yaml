apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "restaurant-api.fullname" . }}-config
  labels:
    {{- include "restaurant-api.labels" . | nindent 4 }}
# Non-sensitive config only. Anything secret belongs in the Secret,
# injected out-of-band — never in values.yaml in Git.
data:
  APP_ENVIRONMENT: {{ .Values.config.environment | quote }}
  APP_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  APP_REPOSITORY_BACKEND: {{ .Values.config.repositoryBackend | quote }}
  APP_AWS_REGION: {{ .Values.config.awsRegion | quote }}
  APP_DYNAMODB_TABLE: {{ .Values.config.dynamodbTable | quote }}
