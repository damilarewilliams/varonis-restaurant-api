# CI - runs on every pull request. These jobs become required status
# checks in branch protection: red CI = unmergeable PR.
name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Lint, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Static analysis (mypy)
        run: mypy app

      - name: Unit tests (pytest)
        run: pytest

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Format check
        run: terraform fmt -check -recursive ../..

      - name: Init (no backend - validation needs providers, not state)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint chart
        run: helm lint helm/restaurant-api

      - name: Render check
        run: |
          helm template ci helm/restaurant-api \
            --set image.repository=example.local/repo \
            --set image.tag=ci-check > /dev/null
